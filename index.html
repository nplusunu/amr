<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Evidenta recuperarilor">
  <title>AMR</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="app">
    <h1>Au Mai Ramas</h1>

    <!--Balanta - va afisa rezultatul final al zilelor libere ramase-->
    <div class="balance">
      <div>Zile libere (Recuperari) disponibile:</div>
      <div id="balance" class="balance-value">0</div>
    </div>

    <!--Actiuni - de aici se vor opera adunari si scaderi de zile libere-->
    <div class="card">
      <h3>Actiuni</h3>

      <label for="date">Data</label>
      <input type="date" id="date" />

      <label for="type">Recuperare Obtinuta (+) / Utilizata (-)</label>
      <select id="type">
        <option value="earned">Obtinuta</option>
        <option value="used">Utilizata</option>
      </select>

      <label for="category">Categorie</label>
      <select id="category">
        <option value="liber">Liber de Serviciu - 24h, Liber de Stat</option>
        <option value="exercitiu">Exercitiu, Alerta</option>
        <option value="recompensa">Recompensa</option>
      </select>

      <label for="amount">Numar Zile</label>
      <input type="number" step="0.5" id="amount" min="0" />

      <label for="note">Detalii (optional)</label>
      <input type="text" id="note" placeholder="e.g. National holiday"/>

      <button type="button" onclick="addEntry()">Save</button>
    </div>

    <!--Istoric - un log al intrarilor operate in sectiunea precedenta-->
    <div class="card">
      <h3>Istoric</h3>
      <button type="button" onclick="exportCSV()">Export CSV</button>
      <div id="history"></div>
    </div>
  </div>

  <hr>

  <!-- WebAssembly TUI Console Component Area Container -->
  <div class="terminal-container" style="background: #1e1e1e; color: #00ff00; padding: 15px; font-family: monospace; border-radius: 8px; margin-top: 25px;">
    <h3 style="color: #fff; margin-top: 0;">🚀 Wasm Engine Demo Console (C++ Layer)</h3>
    <button id="start-tui-btn" style="background: #00ff00; color: #000; font-weight: bold; padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer;">
      Open REST-TUI Console
    </button>
    
    <!-- Emscripten Standard Output Direct Shell Pipe Hook -->
    <textarea id="output" rows="15" style="width: 100%; background: #000; color: #33ff33; font-family: monospace; border: 1px solid #333; margin-top: 10px; padding: 10px;" readonly></textarea>
  </div>

  <!-- Nota de subsol -->
  <footer class="footnote">
    Constantin &amp; Adina Nistor
  </footer>

  <!-- app.js trebuie lansat inaintea lui wasm_engine.js -->
  <script src="app.js"></script>

  <!-- wasm_engine.js este generat de Emscripten si depinde de app.js -->
   <script async src="wasm_engine.js"></script>
</body>
</html>
