<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name=""description" content="Evidenta recuperarilor">
  <title>AMR</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="app">
    <h1>Au Mai Ramas</h1>

    <div class="balance">
      <div>Zile libere (Recuperari) disponibile:</div>
      <div id="balance" class="balance-value">0</div>
    </div>

    <div class="card">
      <h3>Intrare Noua</h3>

      <label>Data</label>
      <input type="date" id="date" />

      <label>Recuperare Obtinuta (+) / Utilizata (-)</label>
      <select id="type">
        <option value="earned">Obtinuta</option>
        <option value="used">Utilizata</option>
      </select>

      <label>Categorie</label>
      <select id="category">
        <option value="holiday">Holiday Work</option>
        <option value="extra">Extra Work</option>
        <option value="special">Special Day</option>
      </select>

      <label>Numar Zile</label>
      <input type="number" step="0.5" id="amount" />

      <label>Detalii (optional)</label>
      <input type="text" id="note" placeholder="e.g. National holiday"/>

      <button onclick="addEntry()">Save</button>
    </div>

    <div class="card">
      <h3>Istoric</h3>
      <div id="history"></div>
    </div>
  </div>

  <script>
    const rules = {
      holiday: 1.5,
      extra: 0.5,
      special: 1
    };

    let entries = JSON.parse(localStorage.getItem("entries")) || [];

    const dateInput = document.getElementById("date");
    const typeSelect = document.getElementById("type");
    const categorySelect = document.getElementById("category");
    const amountInput = document.getElementById("amount");

    dateInput.valueAsDate = new Date();

    categorySelect.addEventListener("change", autoSetAmount);
    typeSelect.addEventListener("change", toggleCategory);

    function autoSetAmount() {
      if (typeSelect.value === "earned") {
        amountInput.value = rules[categorySelect.value];
      }
    }

    function toggleCategory() {
      const disabled = typeSelect.value === "used";
      categorySelect.disabled = disabled;
      if (disabled) {
        amountInput.value = 1;
      } else {
        autoSetAmount();
      }
    }

    function addEntry() {
      const entry = {
        id: Date.now(),
        date: dateInput.value,
        type: typeSelect.value,
        category: categorySelect.value,
        amount: parseFloat(amountInput.value),
        note: document.getElementById("note").value
      };

      if (!entry.amount || entry.amount <= 0) return;

      entries.unshift(entry);
      save();
      render();
      document.getElementById("note").value = "";
    }

    function deleteEntry(id) {
      entries = entries.filter(e => e.id !== id);
      save();
      render();
    }

    function calculateBalance() {
      return entries.reduce((sum, e) => {
        return e.type === "earned"
          ? sum + e.amount
          : sum - e.amount;
      }, 0);
    }

    function save() {
      localStorage.setItem("entries", JSON.stringify(entries));
    }

    function render() {
      const balance = calculateBalance();
      const balanceEl = document.getElementById("balance");
      balanceEl.textContent = balance.toFixed(1);
      balanceEl.style.color = balance >= 0 ? "var(--positive)" : "var(--negative)";

      const history = document.getElementById("history");
      history.innerHTML = "";

      entries.forEach(e => {
        const div = document.createElement("div");
        div.className = "history-item";

        const sign = e.type === "earned" ? "+" : "−";
        const amountClass = e.type === "earned" ? "amount-positive" : "amount-negative";

        div.innerHTML = `
          <div>
            <div class="${amountClass}">
              ${sign}${e.amount} ${e.type === "earned" ? e.category : "used"}
            </div>
            <div class="note">${e.date} ${e.note ? "– " + e.note : ""}</div>
          </div>
          <button class="delete-btn" onclick="deleteEntry(${e.id})">✕</button>
        `;

        history.appendChild(div);
      });
    }

    autoSetAmount();
    render();
  </script>
</body>
</html>
