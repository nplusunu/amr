<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name=""description" content="Evidenta recuperarilor">
  <title>AMR</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="app">
    <h1>Au Mai Ramas</h1>

    <div class="balance">
      <div>Zile libere (Recuperari) disponibile:</div>
      <div id="balance" class="balance-value">0</div>
    </div>

    <div class="card">
      <h3>Intrare Noua</h3>

      <label>Data</label>
      <input type="date" id="date" />

      <label>Recuperare Obtinuta (+) / Utilizata (-)</label>
      <select id="type">
        <option value="earned">Obtinuta</option>
        <option value="used">Utilizata</option>
      </select>

      <label>Categorie</label>
      <select id="category">
        <option value="liber">Liber de Serviciu - 24h, Liber de Stat</option>
        <option value="exercitiu">Exercitiu, Alerta</option>
        <option value="recompensa">Recompensa</option>
      </select>

      <label>Numar Zile</label>
      <input type="number" step="0.5" id="amount" />

      <label>Detalii (optional)</label>
      <input type="text" id="note" placeholder="e.g. National holiday"/>

      <button onclick="addEntry()">Save</button>
    </div>

    <div class="card">
      <h3>Istoric</h3>
      <div id="history"></div>
    </div>
  </div>

  <!--Scriptul Javascript-->
  <script src="app.js"></script>
</body>
</html>
